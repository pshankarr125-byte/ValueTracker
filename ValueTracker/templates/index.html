<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Spending Coach</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 { margin-top: 0; color: #333; font-size: 26px; text-align: center;}
        h3 { color: #444; border-bottom: 2px solid rgba(255,255,255,0.5); padding-bottom: 5px; margin-bottom: 15px;}
        
        .input-group { margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { display: block; margin-bottom: 5px; color: #444; font-weight: bold; font-size: 14px;}
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.6);
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        
        /* Emotion Buttons Styling */
        .emotion-group { display: flex; justify-content: space-around; margin-top: 10px; margin-bottom: 20px;}
        .emoji-btn {
            font-size: 35px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            padding: 10px;
            transition: 0.3s;
        }
        .emoji-btn:hover { background: rgba(255, 255, 255, 0.7); }
        .emoji-btn.active { 
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #4F46E5; 
            transform: scale(1.1);
        }

        .submit-btn {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #4338ca; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .ai-response {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            color: #222;
            line-height: 1.5;
            border-left: 5px solid #4F46E5;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Smart Spending Coach</h1>
        
        <form method="POST" action="/" onsubmit="return requireEmotion()">
            <h3>1. Your Financial Profile</h3>
            <div class="input-group">
                <label>Monthly Budget (₹)</label>
                <input type="number" name="budget" placeholder="e.g. 20000" required>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Savings Goal</label>
                    <input type="text" name="goal_name" placeholder="e.g. Laptop" required>
                </div>
                <div class="input-group">
                    <label>Target (₹)</label>
                    <input type="number" name="target" placeholder="e.g. 50000" required>
                </div>
            </div>

            <h3>2. Purchase Details</h3>
            <div class="grid-2">
                <div class="input-group">
                    <label>Item Name</label>
                    <input type="text" name="item" placeholder="e.g. Coffee" required>
                </div>
                <div class="input-group">
                    <label>Cost (₹)</label>
                    <input type="number" name="cost" placeholder="150" required>
                </div>
            </div>

            <label>How do you feel about this purchase?</label>
            <div class="emotion-group">
                <button type="button" class="emoji-btn" onclick="selectEmotion('😊', this)">😊</button>
                <button type="button" class="emoji-btn" onclick="selectEmotion('😐', this)">😐</button>
                <button type="button" class="emoji-btn" onclick="selectEmotion('😞', this)">😞</button>
            </div>
            <input type="hidden" name="emotion" id="emotion-input" required>
            
            <button type="submit" class="submit-btn">✨ Analyze with AI Coach</button>
        </form>

        {% if ai_advice %}
        <div class="ai-response">
            <strong>🤖 AI Coach Analysis:</strong>
            <p>{{ ai_advice }}</p>
        </div>
        {% endif %}
    </div>

    <script>
        // This handles highlighting the button and passing the data
        function selectEmotion(emoji, btnElement) {
            document.getElementById('emotion-input').value = emoji;
            let buttons = document.querySelectorAll('.emoji-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // Makes sure the user picks an emotion before submitting
        function requireEmotion() {
            if(!document.getElementById('emotion-input').value) {
                alert('Please select an emotion before analyzing!');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
